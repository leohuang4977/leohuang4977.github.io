<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Intergroup Contact cover">
  <rect width="1600" height="900" fill="#2B3548"/>
  <!-- faint network motif: two clusters bridged -->
  <g stroke="#3F8F84" stroke-opacity="0.20" stroke-width="4">
    <line x1="980" y1="640" x2="1180" y2="600"/>
    <line x1="980" y1="640" x2="1160" y2="720"/>
    <line x1="980" y1="640" x2="1340" y2="660"/>
    <line x1="1180" y1="600" x2="1340" y2="660"/>
    <line x1="1160" y1="720" x2="1340" y2="660"/>
    <line x1="1180" y1="600" x2="1160" y2="720"/>
    <line x1="700" y1="660" x2="980" y2="640"/>
  </g>
  <g fill="#3A4861">
    <circle cx="560" cy="600" r="18"/>
    <circle cx="640" cy="720" r="18"/>
    <circle cx="700" cy="660" r="18"/>
  </g>
  <g fill="#3F8F84" fill-opacity="0.85">
    <circle cx="980" cy="640" r="18"/>
    <circle cx="1180" cy="600" r="18"/>
    <circle cx="1160" cy="720" r="18"/>
    <circle cx="1340" cy="660" r="18"/>
  </g>
  <!-- title -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="100" y="280" fill="#FFFFFF" font-size="88" font-weight="800" letter-spacing="-1">Intergroup Contact</text>
    <text x="100" y="382" fill="#FFFFFF" font-size="88" font-weight="800" letter-spacing="-1">&amp; Prejudice Reduction</text>
    <rect x="104" y="412" width="300" height="8" rx="4" fill="#3F8F84"/>
    <text x="104" y="502" fill="#9AA6B6" font-size="42" font-weight="400">Experimental social-psychology research</text>
    <text x="104" y="582" fill="#3F8F84" font-size="34" font-weight="700" letter-spacing="2">EXPERIMENTAL DESIGN  &#183;  FIELD STUDY</text>
  </g>
</svg>
